<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Яркий градиентный фон -->
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="50%" stop-color="#4ECDC4" />
      <stop offset="100%" stop-color="#45B7D1" />
    </linearGradient>
    
    <radialGradient id="sunGlow">
      <stop offset="0%" stop-color="#FFE66D" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFE66D" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Фон с градиентом -->
  <rect width="64" height="64" rx="12" fill="url(#favGradient)" />
  
  <!-- Световое свечение -->
  <circle cx="32" cy="32" r="28" fill="url(#sunGlow)" />
  
  <!-- Сетка игры -->
  <g transform="translate(12, 12)" stroke="#2D3436" stroke-width="2.5" stroke-linecap="round">
    <!-- Вертикальные линии -->
    <line x1="13.33" y1="0" x2="13.33" y2="40" />
    <line x1="26.67" y1="0" x2="26.67" y2="40" />
    
    <!-- Горизонтальные линии -->
    <line x1="0" y1="13.33" x2="40" y2="13.33" />
    <line x1="0" y1="26.67" x2="40" y2="26.67" />
  </g>
  
  <!-- Крестик (ярко-оранжевый) -->
  <g transform="translate(20, 20)" stroke="#FF8E53" stroke-width="3" stroke-linecap="round">
    <line x1="3" y1="3" x2="11" y2="11" />
    <line x1="11" y1="3" x2="3" y2="11" />
  </g>
  
  <!-- Нолик (ярко-бирюзовый) -->
  <circle cx="44" cy="36" r="5" stroke="#00CEC9" stroke-width="3" fill="none" />
  
  <!-- Декоративные элементы -->
  <circle cx="8" cy="8" r="2" fill="#FFEAA7" />
  <circle cx="56" cy="56" r="3" fill="#FFEAA7" />
  <circle cx="56" cy="8" r="2" fill="#FFEAA7" opacity="0.7" />
</svg>
