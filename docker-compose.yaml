services:
  fastapi:
    build: ./services/api-service
    container_name: fastapi-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app    
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tic-tac-toe
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      CLOUDINARY_BASE_IMAGE_PUBLIC_ID: ${CLOUDINARY_BASE_IMAGE_PUBLIC_ID}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALGORITHM: ${ALGORITHM}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - /app/__pycache__
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - app-network

  go-service:
    env_file:
      - .env
    build: ./services/socket-server
    container_name: go-service
    restart: unless-stopped
    environment:
      GIN_MODE: release
      REDIS_ADDR: redis:6379
      FASTAPI_URL: http://fastapi:8000
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    env_file:
      - .env
    build: ./frontend
    container_name: vue-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_CLOUDINARY_NAME: ${VITE_CLOUDINARY_NAME}
      VITE_CLOUDINARY_API_SECRET: ${VITE_CLOUDINARY_API_SECRET}
      VITE_CLOUDINARY_API_KEY: ${VITE_CLOUDINARY_API_KEY}
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tic-tac-toe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  migration:
    image: amacneil/dbmate
    volumes:
      - ./services/api-service/db/migrations:/migrations
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tic-tac-toe
    command: up
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
